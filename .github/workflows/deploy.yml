name: Deploy to EC2 k3s

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 & ECR push
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          ECR_BACKEND=$ECR_REGISTRY/board-app-github-actions-backend
          ECR_FRONTEND=$ECR_REGISTRY/board-app-github-actions-frontend

          docker build -t $ECR_BACKEND:${{ github.sha }} ./backend
          docker tag $ECR_BACKEND:${{ github.sha }} $ECR_BACKEND:latest
          docker push $ECR_BACKEND:${{ github.sha }}
          docker push $ECR_BACKEND:latest

          docker build -t $ECR_FRONTEND:${{ github.sha }} ./frontend
          docker tag $ECR_FRONTEND:${{ github.sha }} $ECR_FRONTEND:latest
          docker push $ECR_FRONTEND:${{ github.sha }}
          docker push $ECR_FRONTEND:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: k8s yml 파일을 EC2에 복사
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "k8s/"
          target: "~/"

      - name: EC2에 SSH 접속하여 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            export KUBECONFIG=~/.kube/config
            # ↑ 이게 없으면 permission denied 에러 발생!
            # k3s 기본 kubeconfig는 root 전용(/etc/rancher/k3s/k3s.yaml)이라
            # ubuntu 사용자용 ~/.kube/config를 명시적으로 지정해야 함

            kubectl apply -f ~/k8s/backend-configmap.yml
            kubectl apply -f ~/k8s/backend-secret.yml
            kubectl apply -f ~/k8s/backend-deployment.yml
            kubectl apply -f ~/k8s/backend-service.yml
            kubectl apply -f ~/k8s/frontend-deployment.yml
            kubectl apply -f ~/k8s/frontend-service.yml
            kubectl rollout restart deployment/backend-deployment
            kubectl rollout restart deployment/frontend-deployment

      - name: 배포 성공 알림
        if: success()
        run: echo "배포 성공! 커밋: ${{ github.sha }}"

      - name: 배포 실패 알림
        if: failure()
        run: echo "배포 실패! GitHub Actions 로그를 확인하세요."